<!doctype html>
<html lang="en">

<head>
  <title>Page Not Found (404)</title>
  <meta charset="utf-8">
  <meta name="viewport" content="initial-scale=1, width=device-width">
  <meta name="robots" content="noindex, nofollow">

  <style>
    *, *::before, *::after {
      box-sizing: border-box;
    }

    html {
      font-size: 16px;
    }

  body {
    background: #FFF;
    color: #261B23;
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Aptos, Roboto, "Segoe UI", "Helvetica Neue", Helvetica, Arial, sans-serif;
    min-height: 100dvh;
    margin: 0;
    padding-top: 0;
  }


    @media (prefers-color-scheme: dark) {
      body {
        background: #09637E;
        color: #e0e0e0;
      }
    }

   main {
    max-width: 32rem;
    margin: 0 auto;
    text-align: center;
    padding: 1.5rem;
  }

    .image-error {
      width: 100%;        /* spans full width */
      height: 300px;      /* small height — adjust as needed */
      object-fit: cover;  /* crops the image nicely */
      display: block;     /* removes inline spacing */
      margin: 0;
      border-radius: 10px;        /* no margins left/right */
    }



    article p {
      font-size: 1rem;
      line-height: 1.6;
      margin-top: 0.5rem;
      opacity: 0.9;
    }

    .btn-home {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 1.5rem;
      background: #088395;
      color: #fff;
      font-weight: 600;
      border-radius: 8px;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .btn-home:hover {
      background: #7AB2B2;
      color: #063f52;
    }
  </style>
</head>

  </head>

  <body>

    <!-- This file lives in public/500.html -->

    <main>
      <header>
        <img class="image-error" src="images/500.png" alt="500 Error">
      </header>
      <article>
        <p><strong>We're sorry, something went wrong.</strong></p>
        <a href="/" class="btn-home">Go Back Home</a>
      </article>
    </main>

  </body>

</html>
